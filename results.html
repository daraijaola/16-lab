<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>16 Lab — Search results</title>
    <meta name="description" content="Search results for any track, artist, or freestyle. Pick a track to decode it bar by bar." />
    <link rel="icon" type="image/svg+xml" href="./assets/16-lab-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./lab.css?v=202606172150" />
    <meta property="og:title" content="16 Lab — Search results" />
    <meta property="og:description" content="Search results for any track, artist, or freestyle. Pick a track to decode it bar by bar." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://16labs.xyz/results" />
    <meta property="og:image" content="https://16labs.xyz/assets/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="16 Lab — Search results" />
    <meta name="twitter:description" content="Search results for any track, artist, or freestyle. Pick a track to decode it bar by bar." />
    <meta name="twitter:image" content="https://16labs.xyz/assets/og-card.png" />
  </head>
  <body>
    <div class="lab-shell" data-screen-label="Search results">
      <header class="lab-topbar" aria-label="App header">
        <a class="brand" href="/">
          <img src="./assets/16-lab-logo.svg" alt="16 Lab" />
          <span><strong>16</strong>Lab</span>
        </a>

        <nav class="lab-nav" aria-label="App navigation">
          <a href="/lab">Overview</a>
          <a href="/decodes">Decodes</a>
          <a href="/scores">Scores</a>
        </nav>

        <a class="back-link" href="/lab">
          <span aria-hidden="true">&#8598;</span>
          Back to search
        </a>
      </header>

      <main class="lab-main results-main">
        <section class="results-section" aria-label="Search results">
          <form class="results-search" id="searchForm" aria-label="Refine your search">
            <div class="search-field results-field">
              <span class="search-glyph" aria-hidden="true"></span>
              <input
                id="lab-search"
                type="search"
                value="Dave"
                placeholder="Search any track, artist, or freestyle&hellip;"
                autocomplete="off"
                aria-label="Search the catalog"
              />
              <button type="submit">Search</button>
            </div>
          </form>

          <div class="results-bar">
            <p class="results-count" id="resultsCount">
              <strong>7 tracks</strong> for &ldquo;Dave&rdquo;
            </p>
            <div class="state-switch" role="group" aria-label="Preview page state">
              <button type="button" class="state-pill is-active" data-state="results">Results</button>
              <button type="button" class="state-pill" data-state="loading">Loading</button>
              <button type="button" class="state-pill" data-state="empty">No results</button>
            </div>
          </div>

          <!-- Results list -->
          <ol class="results-list" id="resultsList">
          </ol>

          <!-- Loading skeleton -->
          <ol class="results-skeleton" id="resultsSkeleton" hidden aria-hidden="true">
            <li class="skel-row">
              <span class="skel-art"></span>
              <span class="skel-info">
                <span class="skel-line skel-line-title"></span>
                <span class="skel-line skel-line-artist"></span>
              </span>
              <span class="skel-badge"></span>
              <span class="skel-time"></span>
              <span class="skel-btn"></span>
            </li>
            <li class="skel-row">
              <span class="skel-art"></span>
              <span class="skel-info">
                <span class="skel-line skel-line-title"></span>
                <span class="skel-line skel-line-artist"></span>
              </span>
              <span class="skel-badge"></span>
              <span class="skel-time"></span>
              <span class="skel-btn"></span>
            </li>
            <li class="skel-row">
              <span class="skel-art"></span>
              <span class="skel-info">
                <span class="skel-line skel-line-title"></span>
                <span class="skel-line skel-line-artist"></span>
              </span>
              <span class="skel-badge"></span>
              <span class="skel-time"></span>
              <span class="skel-btn"></span>
            </li>
            <li class="skel-row">
              <span class="skel-art"></span>
              <span class="skel-info">
                <span class="skel-line skel-line-title"></span>
                <span class="skel-line skel-line-artist"></span>
              </span>
              <span class="skel-badge"></span>
              <span class="skel-time"></span>
              <span class="skel-btn"></span>
            </li>
            <li class="skel-row">
              <span class="skel-art"></span>
              <span class="skel-info">
                <span class="skel-line skel-line-title"></span>
                <span class="skel-line skel-line-artist"></span>
              </span>
              <span class="skel-badge"></span>
              <span class="skel-time"></span>
              <span class="skel-btn"></span>
            </li>
          </ol>

          <!-- No results -->
          <div class="results-empty" id="resultsEmpty" hidden>
            <span class="empty-glyph" aria-hidden="true"></span>
            <p class="empty-line">No tracks match &ldquo;<span id="emptyQuery">xyzzy</span>&rdquo; &mdash; try a different spelling, or drop the audio instead.</p>
            <div class="empty-actions">
              <button class="empty-action empty-action-search" type="button">Edit search</button>
              <a class="empty-action empty-action-upload" href="/lab#upload">
                <span class="up-arrow" aria-hidden="true"></span>
                Drop a freestyle
              </a>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      (function () {
        var list    = document.getElementById("resultsList");
        var skeleton= document.getElementById("resultsSkeleton");
        var empty   = document.getElementById("resultsEmpty");
        var count   = document.getElementById("resultsCount");
        var input   = document.getElementById("lab-search");
        var form    = document.getElementById("searchForm");
        var emptyQuery = document.getElementById("emptyQuery");
        var pills   = Array.prototype.slice.call(document.querySelectorAll(".state-pill"));

        var params = new URLSearchParams(window.location.search);
        var q = (params.get("q") || "").trim();
        if (q) input.value = q;

        function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
        function fmt(sec) { var m=Math.floor(sec/60),s=Math.floor(sec%60); return m+":"+(s<10?"0":"")+s; }

        function show(state, n) {
          list.hidden     = state !== "results";
          skeleton.hidden = state !== "loading";
          empty.hidden    = state !== "empty";
          var qh = esc(input.value || "");
          if (state === "loading") count.innerHTML = "<strong>Searching</strong> for “" + qh + "”…";
          else if (state === "empty") { count.innerHTML = "<strong>0 tracks</strong> for “" + qh + "”"; emptyQuery.textContent = input.value || ""; }
          else count.innerHTML = "<strong>" + (n||0) + " track" + ((n||0)!==1?"s":"") + "</strong> for “" + qh + "”";
          pills.forEach(function(p){ p.classList.toggle("is-active", p.getAttribute("data-state")===state); });
        }

        function rowHTML(t) {
          var href = "/decode?id=" + encodeURIComponent(t.id);
          var art  = t.coverUrl
            ? '<span class="result-art"><img src="'+esc(t.coverUrl)+'" alt="'+esc(t.title)+' artwork" loading="lazy" /></span>'
            : '<span class="result-art cover-ph" aria-hidden="true"></span>';
          var dur  = t.durationSec ? fmt(t.durationSec) : "";
          return (
            '<li class="result-row">'+
              '<a class="result-hit" href="'+href+'" aria-label="Decode '+esc(t.title)+' by '+esc(t.artist)+'">'+
                art+
                '<span class="result-info">'+
                  '<strong class="result-title">'+esc(t.title)+'</strong>'+
                  '<span class="result-artist">'+esc(t.artist)+'</span>'+
                '</span>'+
              '</a>'+
              '<span class="result-badge">'+
                '<img src="./assets/partners/musixmatch-icon.svg" alt="" aria-hidden="true" />'+
                'Lyrics · Musixmatch'+
              '</span>'+
              (dur?'<span class="result-time">'+dur+'</span>':'')+
              '<a class="decode-btn" href="'+href+'">Decode</a>'+
            '</li>'
          );
        }

        function doSearch(query) {
          if (!query) { show("empty", 0); return; }
          show("loading");
          fetch("/api/search?q=" + encodeURIComponent(query))
            .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
            .then(function(data) {
              var results = data.results || [];
              if (!results.length) { show("empty", 0); return; }
              list.innerHTML = results.map(rowHTML).join("");
              show("results", results.length);
            })
            .catch(function() { show("empty", 0); });
        }

        // Dev pills (manual state preview)
        pills.forEach(function(p){ p.addEventListener("click", function(){ show(p.getAttribute("data-state")); }); });

        // Search form: navigate to results page with new query
        form.addEventListener("submit", function(e) {
          e.preventDefault();
          var newQ = (input.value || "").trim();
          if (!newQ) return;
          window.location.href = "/results?q=" + encodeURIComponent(newQ);
        });

        // Empty-state edit button
        var editBtn = document.querySelector(".empty-action-search");
        if (editBtn) editBtn.addEventListener("click", function(){ show("results"); input.focus(); input.select(); });

        // Init
        if (q) doSearch(q);
        else    show("empty", 0);
      })();
    </script>
  </body>
</html>
