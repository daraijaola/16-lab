<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>16 Lab — Decode</title>
    <meta name="description" content="Tap any bar to decode its meaning, wordplay, and references — with or without audio." />
    <link rel="icon" type="image/svg+xml" href="./assets/16-lab-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./lab.css" />
  </head>
  <body class="decode-body-page">
    <div class="lab-shell" data-screen-label="Decode">
      <header class="lab-topbar" aria-label="App header">
        <a class="brand" href="./index.html">
          <img src="./assets/16-lab-logo.svg" alt="16 Lab" />
          <span><strong>16</strong>Lab</span>
        </a>

        <nav class="lab-nav" aria-label="App navigation">
          <a href="./lab.html">Overview</a>
          <a href="./decodes.html">Decodes</a>
          <a href="./scores.html">Scores</a>
        </nav>

        <a class="back-link" href="./results.html">
          <span aria-hidden="true">&#8598;</span>
          Results
        </a>
      </header>

      <main class="lab-main decode-main">
        <div class="lane-row">
          <div class="decode-crumb">
            <a href="./results.html">Results</a>
            <span aria-hidden="true">/</span>
            <strong>Decode</strong>
          </div>
          <div class="state-switch lane-switch" role="group" aria-label="Preview which lane">
            <button type="button" class="state-pill" data-lane="freestyle">Freestyle &middot; audio</button>
            <button type="button" class="state-pill is-active" data-lane="starlight">Catalog track</button>
          </div>
        </div>

        <!-- Header strip -->
        <header class="decode-head" id="decodeHead"></header>

        <!-- Playback dock — catalog (Spotify) + freestyle (uploaded) -->
        <div class="player-dock" id="playerDock">
          <!-- State 1 · Spotify not connected (catalog default) -->
          <button class="spotify-connect" id="spotifyConnect" type="button" hidden>
            <span class="sp-glyph" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="26" height="26">
                <circle cx="12" cy="12" r="12" fill="#1DB954"></circle>
                <path d="M5.6 9.2c4.3-1.3 9.2-.9 13 1.4M6.5 12.7c3.5-1.1 7.4-.7 10.4 1.1M7.3 16c2.7-.8 5.6-.5 8 1" stroke="#06131f" stroke-width="1.7" stroke-linecap="round" fill="none"></path>
              </svg>
            </span>
            <span class="sp-connect-copy">
              <strong>Connect Spotify to play</strong>
              <span>Play the full track and watch the lyrics light up in time.</span>
            </span>
            <span class="sp-connect-cta" aria-hidden="true">Connect</span>
          </button>

          <!-- State 2/3 · Player bar (connected) -->
          <div class="player-bar" id="playerBar" hidden>
            <span class="player-thumb" id="playerThumb" aria-hidden="true"></span>
            <span class="player-now">
              <strong class="player-title" id="playerTitle">Starlight</strong>
              <span class="player-sub" id="playerArtist">Dave</span>
            </span>
            <button class="player-play" id="playerPlay" type="button" aria-label="Play">
              <span class="ico-play" aria-hidden="true"></span>
            </button>
            <span class="player-time" id="playerCur">0:00</span>
            <div class="player-track" id="playerTrack" role="slider" tabindex="0" aria-label="Seek" aria-valuemin="0" aria-valuemax="222" aria-valuenow="0">
              <span class="player-fill" id="playerFill"></span>
              <span class="player-knob" id="playerKnob"></span>
            </div>
            <span class="player-time player-total" id="playerTotal">3:42</span>
            <span class="player-source" id="playerSource">
              <span class="sp-glyph-sm" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="15" height="15">
                  <circle cx="12" cy="12" r="12" fill="#1DB954"></circle>
                  <path d="M5.6 9.2c4.3-1.3 9.2-.9 13 1.4M6.5 12.7c3.5-1.1 7.4-.7 10.4 1.1M7.3 16c2.7-.8 5.6-.5 8 1" stroke="#06131f" stroke-width="1.7" stroke-linecap="round" fill="none"></path>
                </svg>
              </span>
              <span id="playerSourceLabel">via Spotify</span>
            </span>
          </div>

          <!-- Free-user note (catalog, connected) -->
          <p class="player-note" id="playerNote" hidden>Playing on your Spotify &mdash; Premium needed for in-app controls.</p>
        </div>

        <!-- Body: transcript + right column -->
        <div class="decode-body">
          <section class="transcript-pane" aria-label="Transcript">
            <div class="transcript-head">
              <span class="t-label">Transcript</span>
              <span class="t-hint" id="transcriptHint">Tap any bar to decode it</span>
            </div>
            <div class="transcript-scroll" id="transcriptScroll"></div>
          </section>

          <aside class="right-col" aria-label="Analysis">
            <!-- Track overview -->
            <div class="track-overview" id="trackOverview"></div>

            <!-- Bar decode / thinking / error (becomes bottom sheet on mobile) -->
            <div class="bar-decode" id="barDecode" hidden aria-live="polite"></div>
          </aside>
        </div>
      </main>

      <!-- Mobile sheet scrim -->
      <div class="sheet-scrim" id="sheetScrim" hidden></div>

      <!-- Share card modal -->
      <div class="share-modal" id="shareModal" hidden>
        <div class="share-overlay" id="shareOverlay"></div>
        <div class="share-panel" role="dialog" aria-modal="true" aria-label="Share this decode">
          <div class="share-panel-head">
            <span class="share-panel-title">Share card</span>
            <button class="share-x" id="shareClose" type="button" aria-label="Close">&times;</button>
          </div>

          <div class="share-styles" role="group" aria-label="Card style">
            <button type="button" class="style-pill is-active" data-style="spotlight">Spotlight</button>
            <button type="button" class="style-pill" data-style="ink">Ink</button>
            <button type="button" class="style-pill" data-style="blaze">Blaze</button>
          </div>

          <div class="share-card-wrap">
            <div class="share-card share-card--spotlight" id="shareCard">
              <div class="sc-inner">
                <div class="sc-top">
                  <span class="sc-wordmark"><strong>16</strong>Lab</span>
                  <span class="sc-score">
                    <span class="sc-score-num" id="scScore">87</span>
                    <span class="sc-score-cap">Pen score</span>
                  </span>
                </div>

                <div class="sc-hero">
                  <span class="sc-quotemark" aria-hidden="true">&ldquo;</span>
                  <blockquote class="sc-quote" id="scQuote"></blockquote>
                </div>

                <div class="sc-decode-row">
                  <span class="sc-decode-label">Decoded</span>
                  <p class="sc-decode" id="scDecode"></p>
                </div>

                <div class="sc-foot">
                  <span class="sc-cover" id="scCover"></span>
                  <span class="sc-track">
                    <strong id="scTrack">Starlight</strong>
                    <span id="scArtist">Dave</span>
                  </span>
                  <span class="sc-tag">decoded on <strong>16lab</strong></span>
                </div>
              </div>
            </div>
          </div>

          <div class="share-actions">
            <button class="sa-btn sa-primary" id="saDownload" type="button" aria-label="Download PNG">
              <span class="sa-ico" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 3.5v11" />
                  <path d="M7.5 10l4.5 4.5 4.5-4.5" />
                  <path d="M4.5 19.5h15" />
                </svg>
              </span>
              <span class="sa-lbl">Download PNG</span>
            </button>
            <div class="sa-secondary">
              <button class="sa-btn" id="saCopy" type="button" aria-label="Copy link">
                <span class="sa-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.5 14.5l5-5" />
                    <path d="M11.5 6.5l1.2-1.2a3.7 3.7 0 0 1 5.2 5.2L17 11.6" />
                    <path d="M12.5 17.4l-1.2 1.2a3.7 3.7 0 0 1-5.2-5.2L7 12.4" />
                  </svg>
                </span>
                <span class="sa-lbl">Copy link</span>
              </button>
              <button class="sa-btn" id="saX" type="button" aria-label="Share to X">
                <span class="sa-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.657l-5.214-6.817-5.967 6.817H1.68l7.73-8.835L1.254 2.25h6.826l4.713 6.231 5.451-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117l11.966 15.644z" />
                  </svg>
                </span>
                <span class="sa-lbl">Share to X</span>
              </button>
              <button class="sa-btn" id="saIg" type="button" aria-label="Share to Instagram">
                <span class="sa-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2.5" y="2.5" width="19" height="19" rx="5.4" />
                    <circle cx="12" cy="12" r="4.6" />
                    <circle cx="17.4" cy="6.6" r="1.25" fill="currentColor" stroke="none" />
                  </svg>
                </span>
                <span class="sa-lbl">Instagram</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        /* ---------------- Mock data ---------------- */
        var DATA = {
          starlight: {
            title: "Starlight",
            artist: "Dave",
            sub: "Starlight \u00b7 2022",
            duration: "3:42",
            score: 87,
            cover: "./assets/tracks/starlight-cover.jpg",
            audio: false,
            feat: 1,
            metrics: [
              { label: "Rhyme density", v: 84 },
              { label: "Internal rhymes", v: 79 },
              { label: "Vocabulary richness", v: 91 },
              { label: "Multisyllabic rate", v: 73 },
              { label: "Syllable variance", v: 68 }
            ],
            sections: [
              {
                name: "Intro",
                lines: [
                  {
                    t: 14,
                    text: "Top down, city lights bleed into the rain",
                    meaning: "Driving through the city at night \u2014 success and melancholy blur together behind the windscreen.",
                    wordplay: "\u201cBleed\u201d paints the lights smearing across wet glass while hinting at the quiet pain under the glamour.",
                    refs: ["Convertible imagery", "Noir cityscape"]
                  },
                  {
                    t: 30,
                    text: "I count my blessings quicker than I count the change",
                    meaning: "Gratitude outpaces money; he values what he already has over what he earns.",
                    wordplay: "\u201cCount\u201d pivots between counting blessings and counting cash; \u201cchange\u201d is coins and personal growth at once.",
                    refs: ["Gratitude"],
                    short: "Gratitude outpaces the money \u2014 and it always will."
                  }
                ]
              },
              {
                name: "Verse 1",
                lines: [
                  {
                    t: 58,
                    text: "They want the crown but never felt the weight it brings",
                    meaning: "People crave status without understanding the burden that comes attached to it.",
                    wordplay: "Crown and weight nod to \u201cheavy is the head that wears the crown.\u201d",
                    refs: ["Henry IV", "Uneasy crown"]
                  },
                  {
                    t: 76,
                    text: "I turned my pressure into pressure-treated things",
                    meaning: "He converts stress into something durable, built to outlast the conditions that made it.",
                    wordplay: "\u201cPressure-treated\u201d lumber resists rot \u2014 so pressure is both hardship and a manufacturing process.",
                    refs: ["Carpentry"]
                  },
                  {
                    t: 95,
                    text: "Every L was just a letter in the bigger word",
                    error: true
                  },
                  {
                    t: 116,
                    text: "Momma said the patient ones inherit earth",
                    meaning: "Patience gets rewarded \u2014 delivered as remembered maternal wisdom.",
                    wordplay: "Reworks \u201cthe meek shall inherit the earth\u201d into a lesson about patience.",
                    refs: ["Matthew 5:5"]
                  }
                ]
              },
              {
                name: "Hook",
                lines: [
                  {
                    t: 150,
                    text: "Starlight, I been chasing it my whole life",
                    meaning: "Chasing a distant dream and fame that always stays a step ahead of him.",
                    wordplay: "Starlight is fame and literal light \u2014 already years old by the time it reaches your eyes.",
                    refs: ["Astronomy \u2014 light delay"]
                  },
                  {
                    t: 172,
                    text: "Cold nights turned the hunger into cold drive",
                    meaning: "Hard times converted raw need into a relentless, almost ruthless ambition.",
                    wordplay: "\u201cCold\u201d repeats \u2014 cold nights (hardship) against cold drive (detached focus).",
                    refs: ["Ambition"]
                  }
                ]
              }
            ]
          },
          freestyle: {
            title: "Freestyle \u2014 Untitled",
            artist: "You",
            sub: "Uploaded \u00b7 take 03",
            duration: "1:42",
            score: 74,
            cover: "wave",
            audio: true,
            feat: 5,
            metrics: [
              { label: "Rhyme density", v: 71 },
              { label: "Internal rhymes", v: 66 },
              { label: "Vocabulary richness", v: 77 },
              { label: "Multisyllabic rate", v: 80 },
              { label: "Syllable variance", v: 62 }
            ],
            sections: [
              {
                name: "Intro",
                lines: [
                  {
                    t: 0,
                    text: "No beat picked, I'm just talking off the dome",
                    meaning: "Pure improvisation \u2014 no instrumental, no preparation, just thought to mouth.",
                    wordplay: "\u201cOff the dome\u201d is freestyle slang for rapping straight from the head.",
                    refs: ["Cypher culture"]
                  },
                  {
                    t: 6,
                    text: "Mic in the kitchen, made a studio at home",
                    meaning: "A DIY come-up \u2014 recording wherever the space allows.",
                    wordplay: "Kitchen is the literal room and slang for where you \u201ccook\u201d the music.",
                    refs: ["Bedroom studio era"]
                  }
                ]
              },
              {
                name: "Verse 1",
                lines: [
                  {
                    t: 13,
                    text: "First take energy, I never write it twice",
                    meaning: "He prizes raw spontaneity over polish and revision.",
                    wordplay: "\u201cFirst take\u201d is a recording term; \u201cwrite it twice\u201d means no rewrites.",
                    refs: ["One-take recording"]
                  },
                  {
                    t: 20,
                    text: "Every other bar I'm rolling double on the dice",
                    meaning: "Alternating lines carry bigger and bigger risks \u2014 he keeps raising his own stakes.",
                    wordplay: "\u201cBar\u201d is a lyric and a measure; \u201cdouble on the dice\u201d doubles the bet and lands doubles in craps.",
                    refs: ["Craps"]
                  },
                  {
                    t: 27,
                    text: "Caught a rhythm in the static, let it breathe",
                    error: true
                  },
                  {
                    t: 34,
                    text: "Freestyle therapy, cheaper than the fees",
                    meaning: "Rapping as emotional release \u2014 a free alternative to a therapist's couch.",
                    wordplay: "\u201cFees\u201d are therapy bills; a free-style is, literally, free.",
                    refs: ["Catharsis"],
                    short: "Rapping as release \u2014 the therapy you never pay for."
                  }
                ]
              },
              {
                name: "Outro",
                lines: [
                  {
                    t: 42,
                    text: "Stop the tape right there, that's the one",
                    meaning: "He recognises the perfect take the instant it happens.",
                    wordplay: "\u201cStop the tape\u201d nods to analog recording; \u201cthe one\u201d is the keeper.",
                    refs: ["Tape recording"]
                  },
                  {
                    t: 49,
                    text: "Untitled for now but the feeling's already won",
                    meaning: "The song has no name yet, but it already feels like a victory.",
                    wordplay: "\u201cUntitled\u201d against \u201cwon\u201d \u2014 a working title vs a win; won and one slant-rhyme.",
                    refs: ["Working titles"]
                  }
                ]
              }
            ]
          }
        };

        var TOTAL_SECONDS = 102; /* freestyle mock length 1:42 */

        /* ---------------- Elements ---------------- */
        var head = document.getElementById("decodeHead");
        var scroll = document.getElementById("transcriptScroll");
        var overview = document.getElementById("trackOverview");
        var barDecode = document.getElementById("barDecode");
        var playerBar = document.getElementById("playerBar");
        var playerDock = document.getElementById("playerDock");
        var spotifyConnect = document.getElementById("spotifyConnect");
        var playerNote = document.getElementById("playerNote");
        var playerThumb = document.getElementById("playerThumb");
        var playerTitle = document.getElementById("playerTitle");
        var playerArtist = document.getElementById("playerArtist");
        var playerTotalEl = document.getElementById("playerTotal");
        var playerSource = document.getElementById("playerSource");
        var playerSourceLabel = document.getElementById("playerSourceLabel");
        var hint = document.getElementById("transcriptHint");
        var scrim = document.getElementById("sheetScrim");
        var lanePills = Array.prototype.slice.call(document.querySelectorAll(".lane-switch [data-lane]"));

        var state = { lane: "starlight", selected: null, token: 0, playing: false, cur: 0, total: 102, connected: false, timer: null };

        function durToSec(d) {
          var p = String(d).split(":");
          return (+p[0]) * 60 + (+p[1]);
        }

        function fmt(s) {
          var m = Math.floor(s / 60);
          var sec = Math.floor(s % 60);
          return m + ":" + (sec < 10 ? "0" : "") + sec;
        }

        function esc(t) {
          return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        /* ---------------- Render: header ---------------- */
        function renderHead() {
          var d = DATA[state.lane];
          var art = d.cover === "wave"
            ? '<span class="head-art head-art-wave" aria-hidden="true">' +
                [38, 74, 52, 90, 60, 34, 70].map(function (h) {
                  return '<span style="--h:' + h + '%"></span>';
                }).join("") +
              "</span>"
            : '<span class="head-art"><img src="' + d.cover + '" alt="' + esc(d.title) + ' artwork" /></span>';

          var badge = d.audio
            ? '<span class="head-badge head-badge--scribe"><span class="badge-wave" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>Transcribed \u00b7 Scribe</span>'
            : '<span class="head-badge"><img src="./assets/partners/musixmatch-icon.svg" alt="" aria-hidden="true" />Lyrics \u00b7 Musixmatch</span>';

          head.innerHTML =
            art +
            '<div class="head-meta">' +
              '<div class="head-titles">' +
                "<h1>" + esc(d.title) + "</h1>" +
                '<p class="head-artist">' + esc(d.artist) + "</p>" +
              "</div>" +
              '<div class="head-facts">' +
                "<span>" + d.duration + "</span>" +
                badge +
              "</div>" +
            "</div>" +
            '<div class="head-aside">' +
              '<div class="pen-score" title="Pen score">' +
                '<span class="pen-glyph" aria-hidden="true"></span>' +
                '<span class="pen-num">' + d.score + "</span>" +
                '<span class="pen-cap">Pen score</span>' +
              "</div>" +
              '<button class="share-btn" type="button"><span class="share-ico" aria-hidden="true"></span>Share card</button>' +
            "</div>";
        }

        /* ---------------- Render: transcript ---------------- */
        function renderTranscript() {
          var d = DATA[state.lane];
          var idx = 0;
          var html = "";
          d.sections.forEach(function (sec) {
            html += '<div class="t-section">';
            html += '<div class="t-section-label">' + esc(sec.name) + "</div>";
            sec.lines.forEach(function (ln) {
              var i = idx++;
              html +=
                '<button class="bar" type="button" data-i="' + i + '"' +
                (typeof ln.t === "number" ? ' data-t="' + ln.t + '"' : "") +
                (ln.error ? ' data-error="1"' : "") +
                ">" +
                '<span class="bar-text">' + esc(ln.text) + "</span>" +
                '<span class="bar-spin" aria-hidden="true"><span></span><span></span><span></span>decoding\u2026</span>' +
                "</button>";
            });
            html += "</div>";
          });
          scroll.innerHTML = html;

          Array.prototype.forEach.call(scroll.querySelectorAll(".bar"), function (b) {
            b.addEventListener("click", function () {
              selectBar(parseInt(b.getAttribute("data-i"), 10), b);
            });
          });
        }

        function flatLines() {
          var out = [];
          DATA[state.lane].sections.forEach(function (s) {
            s.lines.forEach(function (l) { out.push(l); });
          });
          return out;
        }

        /* ---------------- Render: track overview ---------------- */
        function renderOverview() {
          var d = DATA[state.lane];
          var tiles = d.metrics.map(function (m) {
            return (
              '<div class="metric-tile">' +
                '<div class="metric-top"><span class="metric-label">' + m.label + "</span>" +
                '<span class="metric-num">' + m.v + "</span></div>" +
                '<div class="metric-bar"><span style="width:' + m.v + '%"></span></div>' +
              "</div>"
            );
          }).join("");
          overview.innerHTML =
            '<div class="overview-top">' +
              '<span class="overview-kicker">Track score</span>' +
              '<div class="overview-score"><span class="big-score">' + d.score + '</span><span class="score-of">/ 100</span></div>' +
              '<p class="overview-note">Weighted across five technical metrics. Tap a bar to see how it scored.</p>' +
            "</div>" +
            '<div class="metric-grid">' + tiles + "</div>";
        }

        /* ---------------- Bar selection + thinking ---------------- */
        function selectBar(i, el) {
          var lines = flatLines();
          var ln = lines[i];
          state.selected = i;

          Array.prototype.forEach.call(scroll.querySelectorAll(".bar"), function (b) {
            b.classList.toggle("is-selected", b === el);
            b.classList.remove("is-thinking");
          });
          el.classList.add("is-thinking");

          document.body.classList.add("is-decoding");
          scrim.hidden = false;

          // thinking state in panel
          barDecode.hidden = false;
          overview.classList.add("is-dimmed");
          barDecode.innerHTML =
            '<div class="decode-grip" aria-hidden="true"></div>' +
            '<div class="decode-thinking">' +
              '<span class="think-dots"><span></span><span></span><span></span></span>' +
              "<span>Decoding bar\u2026</span>" +
            "</div>" +
            '<div class="think-skel"><span></span><span></span><span></span></div>';

          var token = ++state.token;
          setTimeout(function () {
            if (token !== state.token) return;
            el.classList.remove("is-thinking");
            renderDecode(ln);
          }, 850);
        }

        function renderDecode(ln) {
          var d = DATA[state.lane];
          var body;
          if (ln.error) {
            body =
              '<div class="decode-error">' +
                '<span class="err-ico" aria-hidden="true">!</span>' +
                '<div><strong>Couldn\u2019t match this on Musixmatch.</strong>' +
                "<p>Here\u2019s the raw transcript line \u2014 meaning, wordplay and references aren\u2019t available for unmatched bars yet.</p></div>" +
              "</div>" +
              '<div class="raw-line">' + esc(ln.text) + "</div>";
          } else {
            var refs = (ln.refs || []).map(function (r) {
              return '<span class="ref-tag">' + esc(r) + "</span>";
            }).join("");
            body =
              '<div class="decode-block"><span class="db-label">Meaning</span><p>' + esc(ln.meaning) + "</p></div>" +
              '<div class="decode-block"><span class="db-label">Wordplay</span><p>' + esc(ln.wordplay) + "</p></div>" +
              (refs ? '<div class="decode-block"><span class="db-label">References</span><div class="ref-row">' + refs + "</div></div>" : "");
          }

          barDecode.innerHTML =
            '<div class="decode-grip" aria-hidden="true"></div>' +
            '<div class="decode-head-row">' +
              '<button class="back-overview" type="button"><span aria-hidden="true">&larr;</span> Track overview</button>' +
              '<button class="sheet-close" type="button" aria-label="Close">&times;</button>' +
            "</div>" +
            '<blockquote class="decoded-bar">' + esc(ln.text) + "</blockquote>" +
            body;

          barDecode.querySelector(".back-overview").addEventListener("click", closeDecode);
          var sc = barDecode.querySelector(".sheet-close");
          if (sc) sc.addEventListener("click", closeDecode);
        }

        function closeDecode() {
          state.token++;
          state.selected = null;
          document.body.classList.remove("is-decoding");
          scrim.hidden = true;
          barDecode.hidden = true;
          overview.classList.remove("is-dimmed");
          Array.prototype.forEach.call(scroll.querySelectorAll(".bar"), function (b) {
            b.classList.remove("is-selected", "is-thinking");
          });
        }

        scrim.addEventListener("click", closeDecode);

        /* ---------------- Karaoke player (Lane A) ---------------- */
        var playBtn = document.getElementById("playerPlay");
        var fill = document.getElementById("playerFill");
        var knob = document.getElementById("playerKnob");
        var curEl = document.getElementById("playerCur");
        var trackEl = document.getElementById("playerTrack");

        function paintPlayer() {
          var pct = (state.cur / TOTAL_SECONDS) * 100;
          fill.style.width = pct + "%";
          knob.style.left = pct + "%";
          curEl.textContent = fmt(state.cur);
          trackEl.setAttribute("aria-valuenow", Math.round(state.cur));
        }

        function activeKaraoke() {
          var bars = scroll.querySelectorAll(".bar[data-t]");
          var activeEl = null;
          Array.prototype.forEach.call(bars, function (b) {
            var t = parseFloat(b.getAttribute("data-t"));
            b.classList.remove("is-karaoke");
            if (t <= state.cur) activeEl = b;
          });
          if (activeEl) {
            activeEl.classList.add("is-karaoke");
            // auto-scroll the pane (desktop scroll container only)
            if (scroll.scrollHeight > scroll.clientHeight + 4) {
              var pr = scroll.getBoundingClientRect();
              var br = activeEl.getBoundingClientRect();
              var delta = (br.top - pr.top) - (scroll.clientHeight / 2 - activeEl.clientHeight / 2);
              scroll.scrollTo({ top: scroll.scrollTop + delta, behavior: "smooth" });
            }
          }
        }

        function setPlaying(on) {
          state.playing = on;
          playBtn.classList.toggle("is-playing", on);
          playBtn.setAttribute("aria-label", on ? "Pause" : "Play");
          playBtn.querySelector("span").className = on ? "ico-pause" : "ico-play";
          if (on) {
            state.timer = setInterval(function () {
              state.cur += 0.25;
              if (state.cur >= TOTAL_SECONDS) {
                state.cur = TOTAL_SECONDS;
                paintPlayer();
                activeKaraoke();
                setPlaying(false);
                return;
              }
              paintPlayer();
              activeKaraoke();
            }, 250);
          } else if (state.timer) {
            clearInterval(state.timer);
            state.timer = null;
          }
        }

        playBtn.addEventListener("click", function () { setPlaying(!state.playing); });

        function seekFromEvent(e) {
          var rect = trackEl.getBoundingClientRect();
          var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
          var pct = Math.max(0, Math.min(1, x / rect.width));
          state.cur = pct * TOTAL_SECONDS;
          paintPlayer();
          activeKaraoke();
        }
        trackEl.addEventListener("click", seekFromEvent);
        trackEl.addEventListener("keydown", function (e) {
          if (e.key === "ArrowRight") { state.cur = Math.min(TOTAL_SECONDS, state.cur + 3); paintPlayer(); activeKaraoke(); }
          if (e.key === "ArrowLeft") { state.cur = Math.max(0, state.cur - 3); paintPlayer(); activeKaraoke(); }
        });

        /* ---------------- Playback dock ---------------- */
        function renderDock() {
          var d = DATA[state.lane];
          state.total = durToSec(d.duration);
          TOTAL_SECONDS = state.total;
          trackEl.setAttribute("aria-valuemax", state.total);
          var isSpotify = !d.audio; /* catalog → Spotify; freestyle → uploaded file */

          // thumbnail
          if (d.cover === "wave") {
            playerThumb.className = "player-thumb player-thumb-wave";
            playerThumb.innerHTML = [38, 72, 52, 88, 60, 34].map(function (h) {
              return '<span style="--h:' + h + '%"></span>';
            }).join("");
          } else {
            playerThumb.className = "player-thumb";
            playerThumb.innerHTML = '<img src="' + d.cover + '" alt="" />';
          }
          playerTitle.textContent = d.title;
          playerArtist.textContent = d.artist;
          playerTotalEl.textContent = d.duration;

          // source tag
          if (isSpotify) {
            playerSource.classList.remove("is-local");
            playerSourceLabel.textContent = "via Spotify";
          } else {
            playerSource.classList.add("is-local");
            playerSourceLabel.textContent = "Synced transcript";
          }

          // state machine: catalog starts un-connected; freestyle plays directly
          var showConnect = isSpotify && !state.connected;
          spotifyConnect.hidden = !showConnect;
          playerBar.hidden = showConnect;
          playerNote.hidden = !(isSpotify && state.connected);

          document.body.classList.add("has-dock");

          paintPlayer();
          activeKaraoke();
          playBtn.querySelector("span").className = "ico-play";
          playBtn.classList.remove("is-playing");
        }

        spotifyConnect.addEventListener("click", function () {
          state.connected = true;
          renderDock();
        });

        /* ---------------- Lane switching ---------------- */
        function setLane(lane) {
          if (state.timer) { clearInterval(state.timer); state.timer = null; }
          state.lane = lane;
          state.playing = false;
          state.cur = 0;
          state.selected = null;
          state.connected = false;
          state.token++;
          closeDecode();

          lanePills.forEach(function (p) {
            p.classList.toggle("is-active", p.getAttribute("data-lane") === lane);
          });

          var hasAudio = DATA[lane].audio;
          document.body.classList.toggle("lane-audio", hasAudio);
          hint.textContent = hasAudio
            ? "Press play, or tap any bar to decode"
            : "Connect to play, or tap any bar to decode";

          renderHead();
          renderTranscript();
          renderOverview();
          renderDock();
          window.scrollTo(0, 0);
        }

        lanePills.forEach(function (p) {
          p.addEventListener("click", function () { setLane(p.getAttribute("data-lane")); });
        });

        /* ---------------- Share card modal ---------------- */
        var modal = document.getElementById("shareModal");
        var shareCard = document.getElementById("shareCard");
        var scScore = document.getElementById("scScore");
        var scQuote = document.getElementById("scQuote");
        var scDecode = document.getElementById("scDecode");
        var scTrack = document.getElementById("scTrack");
        var scArtist = document.getElementById("scArtist");
        var scCover = document.getElementById("scCover");

        function condense(ln) {
          if (ln.short) return ln.short;
          var m = ln.meaning || "";
          var i = m.indexOf(". ");
          return i > 0 ? m.slice(0, i + 1) : m;
        }

        function featuredLine() {
          var lines = flatLines();
          if (state.selected != null && lines[state.selected] && !lines[state.selected].error) {
            return lines[state.selected];
          }
          return lines[DATA[state.lane].feat];
        }

        function paintShare() {
          var d = DATA[state.lane];
          var ln = featuredLine();
          scScore.textContent = d.score;
          scQuote.textContent = ln.text;
          scDecode.textContent = condense(ln);
          scTrack.textContent = d.title;
          scArtist.textContent = d.artist;
          scCover.innerHTML = d.cover === "wave"
            ? '<span class="sc-wave">' +
                [42, 74, 54, 90, 62].map(function (h) {
                  return '<span style="--h:' + h + '%"></span>';
                }).join("") +
              "</span>"
            : '<img src="' + d.cover + '" alt="" />';
          // scale hero to bar length
          var len = ln.text.length;
          shareCard.style.setProperty("--hero", len > 48 ? "6.8cqw" : len > 34 ? "7.8cqw" : "9cqw");
        }

        function openShare() {
          paintShare();
          modal.hidden = false;
          document.body.classList.add("share-open");
        }
        function closeShare() {
          modal.hidden = true;
          document.body.classList.remove("share-open");
        }

        head.addEventListener("click", function (e) {
          if (e.target.closest(".share-btn")) openShare();
        });
        document.getElementById("shareClose").addEventListener("click", closeShare);
        document.getElementById("shareOverlay").addEventListener("click", closeShare);
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && !modal.hidden) closeShare();
        });

        // style presets
        Array.prototype.forEach.call(modal.querySelectorAll(".style-pill"), function (p) {
          p.addEventListener("click", function () {
            Array.prototype.forEach.call(modal.querySelectorAll(".style-pill"), function (q) {
              q.classList.toggle("is-active", q === p);
            });
            shareCard.className = "share-card share-card--" + p.getAttribute("data-style");
          });
        });

        // action feedback
        function flash(btn, text) {
          var lbl = btn.querySelector(".sa-lbl");
          if (!lbl) return;
          if (btn.dataset.busy) return;
          btn.dataset.busy = "1";
          var prev = lbl.textContent;
          btn.classList.add("is-done");
          lbl.textContent = text;
          setTimeout(function () {
            lbl.textContent = prev;
            btn.classList.remove("is-done");
            delete btn.dataset.busy;
          }, 1500);
        }
        document.getElementById("saCopy").addEventListener("click", function () {
          var url = "https://16lab.app/d/" + state.lane + "-" + DATA[state.lane].score;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).catch(function () {});
          }
          flash(this, "Link copied");
        });
        document.getElementById("saDownload").addEventListener("click", function () {
          flash(this, "Preparing\u2026");
        });
        document.getElementById("saX").addEventListener("click", function () { flash(this, "Opening X\u2026"); });
        document.getElementById("saIg").addEventListener("click", function () { flash(this, "Opening\u2026"); });

        // init
        setLane("starlight");
      })();
    </script>
  </body>
</html>
