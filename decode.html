<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>16 Lab — Decode</title>
    <meta name="description" content="Tap any bar to decode its meaning, wordplay, and references — with or without audio." />
    <link rel="icon" type="image/svg+xml" href="./assets/16-lab-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./lab.css" />
  </head>
  <body class="decode-body-page">
    <div class="lab-shell" data-screen-label="Decode">
      <header class="lab-topbar" aria-label="App header">
        <a class="brand" href="./index.html">
          <img src="./assets/16-lab-logo.svg" alt="16 Lab" />
          <span><strong>16</strong>Lab</span>
        </a>

        <nav class="lab-nav" aria-label="App navigation">
          <a href="./lab.html">Overview</a>
          <a href="./decodes.html">Decodes</a>
          <a href="./scores.html">Scores</a>
        </nav>

        <a class="back-link" href="./results.html">
          <span aria-hidden="true">&#8598;</span>
          Results
        </a>
      </header>

      <main class="lab-main decode-main">
        <div class="lane-row">
          <div class="decode-crumb">
            <a href="./results.html">Results</a>
            <span aria-hidden="true">/</span>
            <strong>Decode</strong>
          </div>
          <div class="state-switch lane-switch" role="group" aria-label="Preview which lane" hidden>
            <button type="button" class="state-pill" data-lane="freestyle">Freestyle &middot; audio</button>
            <button type="button" class="state-pill is-active" data-lane="starlight">Catalog track</button>
          </div>
        </div>

        <!-- Header strip -->
        <header class="decode-head" id="decodeHead"></header>

        <!-- Playback dock — catalog (Spotify) + freestyle (uploaded) -->
        <div class="player-dock" id="playerDock">
          <!-- State 1 · Spotify not connected (catalog default) -->
          <button class="spotify-connect" id="spotifyConnect" type="button" hidden>
            <span class="sp-glyph" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="26" height="26">
                <circle cx="12" cy="12" r="12" fill="#1DB954"></circle>
                <path d="M5.6 9.2c4.3-1.3 9.2-.9 13 1.4M6.5 12.7c3.5-1.1 7.4-.7 10.4 1.1M7.3 16c2.7-.8 5.6-.5 8 1" stroke="#06131f" stroke-width="1.7" stroke-linecap="round" fill="none"></path>
              </svg>
            </span>
            <span class="sp-connect-copy">
              <strong>Connect Spotify to play</strong>
              <span>Play the full track and watch the lyrics light up in time.</span>
            </span>
            <span class="sp-connect-cta" aria-hidden="true">Connect</span>
          </button>

          <!-- State 2/3 · Player bar (connected) -->
          <div class="player-bar" id="playerBar" hidden>
            <span class="player-thumb" id="playerThumb" aria-hidden="true"></span>
            <span class="player-now">
              <strong class="player-title" id="playerTitle">Starlight</strong>
              <span class="player-sub" id="playerArtist">Dave</span>
            </span>
            <button class="player-play" id="playerPlay" type="button" aria-label="Play">
              <span class="ico-play" aria-hidden="true"></span>
            </button>
            <span class="player-time" id="playerCur">0:00</span>
            <div class="player-track" id="playerTrack" role="slider" tabindex="0" aria-label="Seek" aria-valuemin="0" aria-valuemax="222" aria-valuenow="0">
              <span class="player-fill" id="playerFill"></span>
              <span class="player-knob" id="playerKnob"></span>
            </div>
            <span class="player-time player-total" id="playerTotal">0:00</span>
            <span class="player-source" id="playerSource">
              <span class="sp-glyph-sm" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="15" height="15">
                  <circle cx="12" cy="12" r="12" fill="#1DB954"></circle>
                  <path d="M5.6 9.2c4.3-1.3 9.2-.9 13 1.4M6.5 12.7c3.5-1.1 7.4-.7 10.4 1.1M7.3 16c2.7-.8 5.6-.5 8 1" stroke="#06131f" stroke-width="1.7" stroke-linecap="round" fill="none"></path>
                </svg>
              </span>
              <span id="playerSourceLabel">via Spotify</span>
            </span>
          </div>

          <!-- Free-user note (catalog, connected) -->
          <p class="player-note" id="playerNote" hidden>Playing on your Spotify &mdash; Premium needed for in-app controls.</p>
        </div>

        <!-- Body: transcript + right column -->
        <div class="decode-body">
          <section class="transcript-pane" aria-label="Transcript">
            <div class="transcript-head">
              <span class="t-label">Transcript</span>
              <div class="t-head-right">
                <span class="t-hint" id="transcriptHint">Tap any bar to decode it</span>
                <button type="button" class="rhymes-toggle is-on" id="rhymesToggle" hidden aria-label="Toggle rhyme highlighting">Rhymes</button>
              </div>
            </div>
            <div class="rh-legend" id="rhLegend" hidden aria-hidden="true">
              <span class="rh-leg rh-leg-end">end</span>
              <span class="rh-leg rh-leg-internal">internal</span>
              <span class="rh-leg rh-leg-multi">multi</span>
            </div>
            <div class="transcript-scroll" id="transcriptScroll"></div>
          </section>

          <aside class="right-col" aria-label="Analysis">
            <!-- Track overview -->
            <div class="track-overview" id="trackOverview"></div>

            <!-- Bar decode / thinking / error (becomes bottom sheet on mobile) -->
            <div class="bar-decode" id="barDecode" hidden aria-live="polite"></div>
          </aside>
        </div>
      </main>

      <!-- Mobile sheet scrim -->
      <div class="sheet-scrim" id="sheetScrim" hidden></div>

      <!-- Share card modal -->
      <div class="share-modal" id="shareModal" hidden>
        <div class="share-overlay" id="shareOverlay"></div>
        <div class="share-panel" role="dialog" aria-modal="true" aria-label="Share this decode">
          <div class="share-panel-head">
            <span class="share-panel-title">Share card</span>
            <button class="share-x" id="shareClose" type="button" aria-label="Close">&times;</button>
          </div>

          <div class="share-styles" role="group" aria-label="Card style">
            <button type="button" class="style-pill is-active" data-style="spotlight">Spotlight</button>
            <button type="button" class="style-pill" data-style="ink">Ink</button>
            <button type="button" class="style-pill" data-style="blaze">Blaze</button>
          </div>

          <div class="share-card-wrap">
            <div class="share-card share-card--spotlight" id="shareCard">
              <div class="sc-inner">
                <div class="sc-top">
                  <span class="sc-wordmark"><strong>16</strong>Lab</span>
                  <span class="sc-score">
                    <span class="sc-score-num" id="scScore">87</span>
                    <span class="sc-score-cap">Pen score</span>
                  </span>
                </div>

                <div class="sc-hero">
                  <span class="sc-quotemark" aria-hidden="true">&ldquo;</span>
                  <blockquote class="sc-quote" id="scQuote"></blockquote>
                </div>

                <div class="sc-decode-row">
                  <span class="sc-decode-label">Decoded</span>
                  <p class="sc-decode" id="scDecode"></p>
                </div>

                <div class="sc-foot">
                  <span class="sc-cover" id="scCover"></span>
                  <span class="sc-track">
                    <strong id="scTrack">Starlight</strong>
                    <span id="scArtist">Dave</span>
                  </span>
                  <span class="sc-tag">decoded on <strong>16lab</strong></span>
                </div>
              </div>
            </div>
          </div>

          <div class="share-actions">
            <button class="sa-btn sa-primary" id="saDownload" type="button" aria-label="Download PNG">
              <span class="sa-ico" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 3.5v11" />
                  <path d="M7.5 10l4.5 4.5 4.5-4.5" />
                  <path d="M4.5 19.5h15" />
                </svg>
              </span>
              <span class="sa-lbl">Download PNG</span>
            </button>
            <div class="sa-secondary">
              <button class="sa-btn" id="saCopy" type="button" aria-label="Copy link">
                <span class="sa-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.5 14.5l5-5" />
                    <path d="M11.5 6.5l1.2-1.2a3.7 3.7 0 0 1 5.2 5.2L17 11.6" />
                    <path d="M12.5 17.4l-1.2 1.2a3.7 3.7 0 0 1-5.2-5.2L7 12.4" />
                  </svg>
                </span>
                <span class="sa-lbl">Copy link</span>
              </button>
              <button class="sa-btn" id="saX" type="button" aria-label="Share to X">
                <span class="sa-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.657l-5.214-6.817-5.967 6.817H1.68l7.73-8.835L1.254 2.25h6.826l4.713 6.231 5.451-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117l11.966 15.644z" />
                  </svg>
                </span>
                <span class="sa-lbl">Share to X</span>
              </button>
              <button class="sa-btn" id="saIg" type="button" aria-label="Share to Instagram">
                <span class="sa-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2.5" y="2.5" width="19" height="19" rx="5.4" />
                    <circle cx="12" cy="12" r="4.6" />
                    <circle cx="17.4" cy="6.6" r="1.25" fill="currentColor" stroke="none" />
                  </svg>
                </span>
                <span class="sa-lbl">Instagram</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        /* ── Helpers ─────────────────────────────────────────────── */
        function esc(t) { return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
        function fmt(s) { var m=Math.floor(s/60),sec=Math.floor(s%60); return m+":"+(sec<10?"0":"")+sec; }
        function durToSec(d) { var p=String(d).split(":"); return (+p[0])*60+(+p[1]); }

        /* ── URL param ───────────────────────────────────────────── */
        var _params = new URLSearchParams(window.location.search);
        var trackId = _params.get("id") || "";
        var uploadId = _params.get("upload") || "";
        var _uploadAudio = null; /* real <audio> for the uploaded freestyle */

        /* ── Freestyle mock (keeps the demo lane working) ────────── */
        var FREESTYLE = {
          title:"Freestyle — Untitled", artist:"You", duration:"1:42",
          score:74, cover:"wave", audio:true, source:"scribe", feat:3,
          metrics:[
            {key:"rhyme",   label:"Rhyme density",       v:71},
            {key:"internal",label:"Internal rhymes",      v:66},
            {key:"vocab",   label:"Vocabulary richness",  v:77},
            {key:"multi",   label:"Multisyllabic rate",   v:80},
            {key:"variance",label:"Syllable variance",    v:62}
          ],
          sections:[{name:"Verse",lines:[
            {t:0, text:"No beat picked, I’m just talking off the dome"},
            {t:6, text:"Mic in the kitchen, made a studio at home"},
            {t:13,text:"First take energy, I never write it twice"},
            {t:20,text:"Every other bar I’m rolling double on the dice"},
            {t:34,text:"Freestyle therapy, cheaper than the fees"},
            {t:42,text:"Stop the tape right there, that’s the one"},
            {t:49,text:"Untitled for now but the feeling’s already won"}
          ]}]
        };

        /* ── State ───────────────────────────────────────────────── */
        var DATA  = { starlight: null, freestyle: FREESTYLE };
        var TOTAL_SECONDS = 0;
        var state = { lane:"starlight", selected:null, token:0, playing:false,
                      cur:0, total:0, connected:false, timer:null, lastDecode:null };
        /* Rhyme/metric state (persists across lane changes) */
        var _rhymesOn = true;
        var _metricFocus = null;
        var _liveLines = null; /* [{id,text}] for current live track */
        var _depthOpen = false; /* Depth sub-scores expanded? */

        /* ── Elements ────────────────────────────────────────────── */
        var head     = document.getElementById("decodeHead");
        var scroll   = document.getElementById("transcriptScroll");
        var overview = document.getElementById("trackOverview");
        var barDecode= document.getElementById("barDecode");
        var playerBar= document.getElementById("playerBar");
        var spotifyConnect= document.getElementById("spotifyConnect");
        var playerNote= document.getElementById("playerNote");
        var playerThumb= document.getElementById("playerThumb");
        var playerTitle= document.getElementById("playerTitle");
        var playerArtist= document.getElementById("playerArtist");
        var playerTotalEl= document.getElementById("playerTotal");
        var playerSource= document.getElementById("playerSource");
        var playerSourceLabel= document.getElementById("playerSourceLabel");
        var hint         = document.getElementById("transcriptHint");
        var scrim        = document.getElementById("sheetScrim");
        var lanePills    = Array.prototype.slice.call(document.querySelectorAll(".lane-switch [data-lane]"));
        var rhymesToggle = document.getElementById("rhymesToggle");
        var rhLegend     = document.getElementById("rhLegend");
        var laneSwitch   = document.querySelector(".lane-switch");
        var transcriptPane = document.querySelector(".transcript-pane");

        /* ── Loading / error banners ─────────────────────────────── */
        function showLoading() {
          head.innerHTML    = '<div class="decode-loading" style="padding:1.5rem;opacity:.6">Loading track…</div>';
          scroll.innerHTML  = '<div class="decode-loading" style="padding:1.5rem;opacity:.6">Loading lyrics…</div>';
          overview.innerHTML= '<div class="decode-loading" style="padding:1.5rem;opacity:.6">Loading score…</div>';
        }
        function showError(msg) {
          head.innerHTML = '<div class="decode-error" style="padding:1.5rem"><span class="err-ico" aria-hidden="true">!</span><div><strong>'+esc(msg)+'</strong></div></div>';
          scroll.innerHTML = overview.innerHTML = "";
        }

        /* ── Render: header ──────────────────────────────────────── */
        function renderHead() {
          var d = DATA[state.lane];
          var art = d.cover==="wave"
            ? '<span class="head-art head-art-wave" aria-hidden="true">'+[38,74,52,90,60,34,70].map(function(h){return'<span style="--h:'+h+'%"></span>';}).join("")+'</span>'
            : d.cover
              ? '<span class="head-art"><img src="'+esc(d.cover)+'" alt="'+esc(d.title)+' artwork" /></span>'
              : '<span class="head-art cover-ph" aria-hidden="true"></span>';
          var badge = (d.source==="scribe")
            ? '<span class="head-badge head-badge--scribe"><span class="badge-wave" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>Transcribed · Scribe</span>'
            : '<span class="head-badge"><img src="./assets/partners/musixmatch-icon.svg" alt="" aria-hidden="true" />Lyrics · Musixmatch</span>';
          head.innerHTML =
            art+
            '<div class="head-meta">'+
              '<div class="head-titles"><h1>'+esc(d.title)+'</h1><p class="head-artist">'+esc(d.artist)+'</p></div>'+
              '<div class="head-facts"><span>'+d.duration+'</span>'+badge+'</div>'+
            '</div>'+
            '<div class="head-aside">'+
              '<div class="score-pair">'+
                '<div class="score-dial score-dial--tech" title="Technical · craft — deterministic rhyme &amp; flow analysis">'+
                  '<span class="score-dial-num">'+d.score+'</span>'+
                  '<span class="score-dial-cap">Technical · craft</span>'+
                '</div>'+
                depthDialHTML(d)+
              '</div>'+
              '<button class="share-btn" type="button"><span class="share-ico" aria-hidden="true"></span>Share card</button>'+
            '</div>';
        }

        /* Header Depth dial: real number, a shimmer while computing, or nothing
           when Depth is unavailable (live lane only ever sets these). */
        function depthDialHTML(d) {
          if (typeof d.depthScore === "number") {
            return '<div class="score-dial score-dial--depth" title="Depth · lyricism — AI-judged meaning &amp; craft">'+
              '<span class="score-dial-num">'+d.depthScore+'</span>'+
              '<span class="score-dial-cap">Depth · lyricism</span>'+
            '</div>';
          }
          if (d.depthPending) {
            return '<div class="score-dial score-dial--depth is-pending" title="Scoring lyricism…">'+
              '<span class="score-dial-shimmer" aria-hidden="true"></span>'+
              '<span class="score-dial-cap">Depth · lyricism</span>'+
            '</div>';
          }
          return '';
        }

        /* ── Render: transcript ──────────────────────────────────── */
        function renderTranscript() {
          var d = DATA[state.lane]; var idx=0; var html="";
          d.sections.forEach(function(sec) {
            html+='<div class="t-section"><div class="t-section-label">'+esc(sec.name)+'</div>';
            sec.lines.forEach(function(ln) {
              var i=idx++;
              var lineId = ln.id || ("L"+i);
              html+='<button class="bar" type="button" data-i="'+i+'" data-id="'+esc(lineId)+'"'+(typeof ln.t==="number"?' data-t="'+ln.t+'"':'')+'>'+
                '<span class="bar-text">'+esc(ln.text)+'</span>'+
                '<span class="bar-spin" aria-hidden="true"><span></span><span></span><span></span>decoding…</span>'+
                '</button>';
            });
            html+='</div>';
          });
          scroll.innerHTML=html;
          Array.prototype.forEach.call(scroll.querySelectorAll(".bar"),function(b){
            b.addEventListener("click",function(){ selectBar(parseInt(b.getAttribute("data-i"),10),b); });
          });
        }

        function flatLines() {
          var out=[]; DATA[state.lane].sections.forEach(function(s){s.lines.forEach(function(l){out.push(l);});}); return out;
        }

        /* ── Render: overview ────────────────────────────────────── */
        function renderOverview() {
          var d=DATA[state.lane];
          var tiles=d.metrics.map(function(m){
            var focused=(_metricFocus&&_metricFocus===m.key)?" is-focused":"";
            var keyAttr=m.key?' data-key="'+esc(m.key)+'"':'';
            return '<button type="button" class="metric-tile'+focused+'" tabindex="0"'+keyAttr+'>'+
              '<div class="metric-top"><span class="metric-label">'+esc(m.label)+'</span><span class="metric-num">'+m.value+'</span></div>'+
              '<div class="metric-bar"><span style="width:'+m.value+'%"></span></div>'+
              '</button>';
          }).join("");
          overview.innerHTML=
            '<div class="overview-top">'+
              '<span class="overview-kicker">Technical · craft</span>'+
              '<div class="overview-score"><span class="big-score">'+d.score+'</span><span class="score-of">/ 100</span></div>'+
              '<p class="overview-note">Deterministic — weighted across five rhyme &amp; flow metrics. Tap a metric to spotlight it.</p>'+
            '</div>'+
            '<div class="metric-grid">'+tiles+'</div>'+
            depthTileHTML(d);
          /* Wire metric tile clicks */
          Array.prototype.forEach.call(overview.querySelectorAll(".metric-tile[data-key]"),function(t){
            t.addEventListener("click",function(){ setMetricFocus(t.getAttribute("data-key")); });
          });
          /* Wire Depth expand toggle */
          var dToggle=overview.querySelector(".depth-tile-toggle");
          if(dToggle) dToggle.addEventListener("click",function(){
            _depthOpen=!_depthOpen; renderOverview();
          });
        }

        /* Overview Depth tile: AI lyricism score, expandable to six sub-scores +
           rationale. Shows a shimmer on a cache MISS while the model computes;
           hits return instantly so no spinner. Hidden when Depth is unavailable. */
        function depthTileHTML(d) {
          if (d.depthPending) {
            return '<div class="depth-tile is-pending">'+
              '<div class="depth-tile-toprow">'+
                '<span class="depth-tile-kicker">Depth · lyricism</span>'+
                '<span class="depth-scoring"><span class="depth-shimmer" aria-hidden="true"></span>scoring lyricism…</span>'+
              '</div>'+
            '</div>';
          }
          if (typeof d.depthScore !== "number") return "";
          var sub=(d.depthSub||[]).map(function(m){
            return '<div class="metric-tile metric-tile--depth">'+
              '<div class="metric-top"><span class="metric-label">'+esc(m.label)+'</span><span class="metric-num">'+m.value+'</span></div>'+
              '<div class="metric-bar metric-bar--depth"><span style="width:'+m.value+'%"></span></div>'+
            '</div>';
          }).join("");
          var open=_depthOpen?" is-open":"";
          return '<div class="depth-tile'+open+'">'+
            '<button type="button" class="depth-tile-toggle" aria-expanded="'+(_depthOpen?"true":"false")+'">'+
              '<span class="depth-tile-kicker">Depth · lyricism</span>'+
              '<span class="depth-tile-score">'+d.depthScore+'<span class="depth-tile-of">/ 100</span></span>'+
              '<span class="depth-tile-chevron" aria-hidden="true"></span>'+
            '</button>'+
            '<div class="depth-tile-body">'+
              (d.depthRationale?'<p class="depth-rationale">“'+esc(d.depthRationale)+'”</p>':'')+
              '<div class="metric-grid depth-grid">'+sub+'</div>'+
            '</div>'+
          '</div>';
        }

        /* ── Bar select → API decode ─────────────────────────────── */
        function selectBar(i, el) {
          var lines=flatLines(); var ln=lines[i]; state.selected=i;
          Array.prototype.forEach.call(scroll.querySelectorAll(".bar"),function(b){
            b.classList.toggle("is-selected",b===el); b.classList.remove("is-thinking");
          });
          el.classList.add("is-thinking");
          document.body.classList.add("is-decoding");
          scrim.hidden=false; barDecode.hidden=false; overview.classList.add("is-dimmed");
          barDecode.innerHTML=
            '<div class="decode-grip" aria-hidden="true"></div>'+
            '<div class="decode-thinking"><span class="think-dots"><span></span><span></span><span></span></span><span>Decoding bar…</span></div>'+
            '<div class="think-skel"><span></span><span></span><span></span></div>';

          var token=++state.token;
          var d=DATA[state.lane];
          var allText=lines.map(function(l){return l.text;});

          if (d.source==="musixmatch"||d.source==="upload") {
            /* Catalog & uploaded freestyle → live API (uncharted bars decode too) */
            fetch("/api/decode/bar",{
              method:"POST",
              headers:{"Content-Type":"application/json"},
              body:JSON.stringify({lines:allText, target:i, track:{title:d.title,artist:d.artist}})
            })
            .then(function(r){return r.ok?r.json():Promise.reject(r.status);})
            .then(function(res){
              if (token!==state.token) return;
              el.classList.remove("is-thinking");
              renderDecodeResult(res, ln.text);
            })
            .catch(function(){
              if (token!==state.token) return;
              el.classList.remove("is-thinking");
              renderDecodeError(ln.text);
            });
          } else {
            /* Freestyle lane → short mock */
            setTimeout(function(){
              if (token!==state.token) return;
              el.classList.remove("is-thinking");
              renderDecodeResult({
                meaning:"(mock) A plain read of: “"+ln.text+"”.",
                wordplay:"No live decode for uploaded audio yet.",
                references:[], cultural:null
              }, ln.text);
            }, 800);
          }
        }

        function renderDecodeResult(res, barText) {
          state.lastDecode={text:barText, meaning:res.meaning};
          var refs=(res.references||[]).map(function(r){return'<span class="ref-tag">'+esc(r)+'</span>';}).join("");
          var body=
            '<div class="decode-block"><span class="db-label">Meaning</span><p>'+esc(res.meaning)+'</p></div>'+

        function closeDecode() {

        /* ── Player ──────────────────────────────────────────────── */
        var playBtn=document.getElementById("playerPlay");
        var fill=document.getElementById("playerFill");
        var knob=document.getElementById("playerKnob");
        var curEl=document.getElementById("playerCur");
        var trackEl=document.getElementById("playerTrack");

        function paintPlayer() {
          var pct=(state.cur/TOTAL_SECONDS)*100;
          fill.style.width=pct+"%"; knob.style.left=pct+"%";
          curEl.textContent=fmt(state.cur);
          trackEl.setAttribute("aria-valuenow",Math.round(state.cur));
        }
        var _lastKaraokeEl=null;
        function activeKaraoke() {
          var bars=scroll.querySelectorAll(".bar[data-t]"); var activeEl=null;
          Array.prototype.forEach.call(bars,function(b){
            var t=parseFloat(b.getAttribute("data-t")); b.classList.remove("is-karaoke");
            if(t<=state.cur) activeEl=b;
          });
          if(!activeEl) return;
          activeEl.classList.add("is-karaoke");
          if(activeEl===_lastKaraokeEl) return;
          _lastKaraokeEl=activeEl;
          var br=activeEl.getBoundingClientRect();
          if(scroll.scrollHeight>scroll.clientHeight+4){
            /* Desktop: scroll within the transcript pane */
            var pr=scroll.getBoundingClientRect();
            scroll.scrollTo({top:scroll.scrollTop+(br.top-pr.top)-(scroll.clientHeight/2-activeEl.clientHeight/2),behavior:"smooth"});
          } else {
            /* Mobile: scroll the page so the bar sits ~1/3 down (above the dock) */
            var dockH=document.body.classList.contains("has-dock")?96:0;
            var viewH=window.innerHeight-dockH;
            var target=window.scrollY+br.top-viewH*0.33;
            window.scrollTo({top:Math.max(0,target),behavior:"smooth"});
          }
        }
        function setPlaying(on) {
          state.playing=on; playBtn.classList.toggle("is-playing",on);
          playBtn.setAttribute("aria-label",on?"Pause":"Play");
          playBtn.querySelector("span").className=on?"ico-pause":"ico-play";
          if(on){
            state.timer=setInterval(function(){
              state.cur+=0.25;
              if(state.cur>=TOTAL_SECONDS){state.cur=TOTAL_SECONDS;paintPlayer();activeKaraoke();setPlaying(false);return;}
              paintPlayer();activeKaraoke();
            },250);
          } else if(state.timer){clearInterval(state.timer);state.timer=null;}
        }
        /* play/pause handled by Spotify-aware listener above */
        function _isUpload(){ var d=DATA[state.lane]; return !!(_uploadAudio&&d&&d.source==="upload"); }
        function seekFromEvent(e){
          var rect=trackEl.getBoundingClientRect();
          var x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
          var frac=Math.max(0,Math.min(1,x/rect.width));
          if(_isUpload()){ _uploadAudio.currentTime=frac*(TOTAL_SECONDS||_uploadAudio.duration||0); return; }
          state.cur=frac*TOTAL_SECONDS;
          paintPlayer();activeKaraoke();
        }
        trackEl.addEventListener("click",seekFromEvent);
        trackEl.addEventListener("keydown",function(e){
          var delta=e.key==="ArrowRight"?3:e.key==="ArrowLeft"?-3:0;
          if(!delta) return;
          if(_isUpload()){ _uploadAudio.currentTime=Math.max(0,Math.min(TOTAL_SECONDS,_uploadAudio.currentTime+delta)); return; }
          state.cur=Math.max(0,Math.min(TOTAL_SECONDS,state.cur+delta));paintPlayer();activeKaraoke();
        });

        /* ── Playback dock ───────────────────────────────────────── */
        function renderDock() {

          trackEl.setAttribute("aria-valuemax",state.total||1);
          var isSpotify=!!d.spotifyId; /* drive from spotifyId, not audio flag */
          if(d.cover==="wave"){
            playerThumb.className="player-thumb player-thumb-wave";

          } else if(d.cover){

        function showPlayerError(res, spotifyId){
          if(res.noDevice){

            playerNote.innerHTML='No active Spotify device — <a href="spotify:" style="color:inherit;text-decoration:underline">open Spotify</a>, then tap play.';
            playerNote.hidden=false;

              })
              .then(function(r){return r.ok?r.json():Promise.reject("http");})

        /* ── Lane switching ──────────────────────────────────────── */

/* ── Load catalog track from API ─────────────────── */
        function loadCatalogTrack() {
          if(!trackId){
            head.innerHTML='<div style="padding:1.5rem;opacity:.6">No track selected — <a href="./lab.html">search one</a>.</div>';
            scroll.innerHTML=overview.innerHTML=""; return;
          }
          showLoading();

          /* Render track immediately; real score + rhymes patch in via /api/score */
          fetch("/api/track/"+encodeURIComponent(trackId))
            .then(function(r){return r.ok?r.json():Promise.reject();})
            .then(function(d){
              /* Assign stable L0/L1… ids to each line for offset alignment */
              var lineIdx=0;
              var sections=(d.sections||[]).map(function(sec){
                return {name:sec.name,lines:(sec.lines||[]).map(function(ln){
                  return {id:"L"+(lineIdx++),text:ln.text,t:ln.t};
                })};
              });
              DATA.starlight={
                id:d.id, title:d.title, artist:d.artist,
                duration:d.durationSec?fmt(d.durationSec):"0:00",
                score:0, cover:d.coverUrl||null, audio:!!d.synced, feat:0,
                source:"musixmatch", synced:!!d.synced,
                spotifyId:d.spotifyId||null, metrics:[], sections:sections
              };
              renderLane();
              checkSpotifyOnLoad();
              fetchLiveScore(); /* POST displayed lines → real score + rhyme spans */
              fetchDepth();     /* parallel: AI lyricism score (cached for consistency) */
            })
            .catch(function(){ showError("Couldn't load track — go back and try another."); });
        }

        /* ── Load uploaded freestyle (Scribe pipeline result) ───────── */
        function loadUploadTrack(jobId){
          showLoading();
          fetch("/api/upload/"+encodeURIComponent(jobId)+"/result")
            .then(function(r){return r.ok?r.json():Promise.reject(r.status);})
            .then(function(res){
              var lineIdx=0;
              var sections=(res.sections||[]).map(function(sec){
                return {name:sec.name,lines:(sec.lines||[]).map(function(ln){
                  return {id:"L"+(lineIdx++),text:ln.text,t:ln.t};
                })};
              });
              DATA.freestyle={
                id:res.id, title:res.title, artist:res.artist,
                duration:res.durationSec?fmt(res.durationSec):"0:00",
                score:0, cover:"wave", audio:true, source:"upload", synced:true,
                spotifyId:null, metrics:[], sections:sections,
                matched:res.matched, match:res.match,
                audioUrl:"/api/upload/"+encodeURIComponent(jobId)+"/audio"

              renderLane();

              fetchLiveScore(); /* rhymes + Technical score from /api/score */
              fetchDepth();     /* AI Depth score (cached) */
            })
            .catch(function(st){
              if(st===409){ setTimeout(function(){loadUploadTrack(jobId);},1500); return; } /* not ready yet */
              showError("Couldn't load your freestyle — it may have failed. Try uploading again.");
            });

        /* Wire a real <audio> element to drive the player + karaoke */
        function setupUploadAudio(url){

          _uploadAudio.addEventListener("loadedmetadata",function(){

              playerTotalEl.textContent=fmt(TOTAL_SECONDS);
              trackEl.setAttribute("aria-valuemax",Math.round(TOTAL_SECONDS)||1);
            }

            state.cur=_uploadAudio.currentTime; paintPlayer(); activeKaraoke();
          });

          _uploadAudio.addEventListener("pause",function(){ state.playing=false; paintPlayBtn(false); });

        /* ── Check Spotify connection on page load (after OAuth return) ── */
        function checkSpotifyOnLoad() {
          var d=DATA.starlight;
          if(!d||!d.spotifyId) return;
          fetch("/api/spotify/now")
            .then(function(r){return r.ok?r.json():Promise.reject();})
            .then(function(sp){
              if(!sp.connected) return;
              state.connected=true;
              /* Sync play state BEFORE renderDock so the button renders correctly */
              if(sp.isPlaying&&sp.trackId===d.spotifyId){
                /* Already on this track — sync position */
                state.playing=true;

                if(sp.durationMs) TOTAL_SECONDS=sp.durationMs/1000;
              } else if(d.spotifyId){
                /* Auto-play — retry once after 1.5s if device not ready yet */
                _tryAutoPlay(d.spotifyId, 0);

              renderDock();
              startKaraokeSync();
            })
            .catch(function(){});
        }

        function _tryAutoPlay(spotifyId, attempt) {
          fetch("/api/spotify/play",{
            method:"PUT",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({spotifyId:spotifyId})
          })
          .then(function(r){return r.ok?r.json():Promise.reject();})
          .then(function(res){

              playBtn.setAttribute("aria-label","Pause");
              playBtn.querySelector("span").className="ico-pause";

            } else {
              showPlayerError(res, spotifyId);
            }
          }).catch(function(){});
        }

        /* ── Karaoke sync: smooth interpolation + 2s Spotify ground-truth poll ── */
        var _karaokeTimer=null, _smoothTick=null, _spBase=0, _spAt=0, _ignorePlayStateUntil=0;
        function startKaraokeSync(){
          if(_karaokeTimer) clearInterval(_karaokeTimer);
          if(_smoothTick) clearInterval(_smoothTick);
          _spBase=state.cur; _spAt=Date.now();
          /* 100ms smooth tick — advances position between Spotify polls */
          _smoothTick=setInterval(function(){
            if(!state.playing) return;
            state.cur=_spBase+(Date.now()-_spAt)/1000;
            if(state.cur>TOTAL_SECONDS) state.cur=TOTAL_SECONDS;
            paintPlayer(); activeKaraoke();
          },100);
          /* 2s poll: sync position only. Never flip UI to paused — user controls that. */
          _karaokeTimer=setInterval(function(){
            fetch("/api/spotify/now")
              .then(function(r){return r.ok?r.json():Promise.reject();})
              .then(function(sp){
                if(!sp.connected) return;
                if(sp.isPlaying){
                  _spBase=(sp.progressMs||0)/1000; _spAt=Date.now();
                  if(sp.durationMs) TOTAL_SECONDS=sp.durationMs/1000;
                  /* Detect external play (user resumed from Spotify app) */
                  if(!state.playing&&Date.now()>_ignorePlayStateUntil){
                    state.playing=true;
                    playBtn.classList.add("is-playing");
                    playBtn.setAttribute("aria-label","Pause");
                    playBtn.querySelector("span").className="ico-pause";
                  }
                }
              })
              .catch(function(){});
          },2000);
        }

          if(_karaokeTimer){clearInterval(_karaokeTimer);_karaokeTimer=null;}

        /* ── Metric focus ────────────────────────────────────────── */
        function setMetricFocus(key) {

        /* ── Rhyme application ───────────────────────────────────── */
        function applyRhymesToBar(el, text, spans) {
          spans=spans.filter(function(s){ return s.end>s.start&&s.start>=0&&s.end<=text.length; });
          spans.sort(function(a,b){ return a.start-b.start; });
          var merged=[]; var end=-1;
          spans.forEach(function(s){ if(s.start>=end){ merged.push(s); end=s.end; } });
          var html=""; var pos=0;
          merged.forEach(function(s){
            if(s.start>pos) html+=esc(text.slice(pos,s.start));
            html+='<mark class="rh rh-'+esc(s.type)+' rh-g'+(s.group%6)+'">'+esc(text.slice(s.start,s.end))+'</mark>';
            pos=s.end;
          });
          if(pos<text.length) html+=esc(text.slice(pos));
          var bt=el.querySelector(".bar-text");
          if(bt) bt.innerHTML=html;
        }

        function applyAllRhymes(rhymes) {
          var byLine={};
          (rhymes||[]).forEach(function(r){
            if(!byLine[r.lineId]) byLine[r.lineId]=[];
            byLine[r.lineId].push(r);
          });
          var textFor={};
          (_liveLines||[]).forEach(function(ln){ textFor[ln.id]=ln.text; });
          Array.prototype.forEach.call(scroll.querySelectorAll(".bar[data-id]"),function(bar){
            var id=bar.getAttribute("data-id");
            if(byLine[id]&&textFor[id]) applyRhymesToBar(bar,textFor[id],byLine[id]);
          });
        }

        /* ── Fetch live score from /api/score ────────────────────── */
        function fetchLiveScore() {
          var d=DATA[state.lane]; if(!d) return;
          _liveLines=flatLines().map(function(ln){ return {id:ln.id,text:ln.text}; });
          if(!_liveLines.length) return;
          fetch("/api/score",{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({lines:_liveLines})
          })
          .then(function(r){ return r.ok?r.json():Promise.reject(); })
          .then(function(res){
            d.score=res.score||0;
            d.metrics=res.metrics||[];
            renderHead();
            renderOverview();
            applyAllRhymes(res.rhymes||[]);
            if((res.rhymes||[]).length){
              rhymesToggle.hidden=false;
              rhLegend.hidden=false;
            }
          })
          .catch(function(){});
        }

        /* ── Fetch Depth score from /api/depth (live lane only) ──────
           Sibling of fetchLiveScore(); fires in parallel. The backend caches
           by lyrics hash, so the same track returns an IDENTICAL number every
           load. On any failure we just hide the Depth tile — never break the
           page; Technical + rhymes already rendered from /api/score. */
        function fetchDepth() {
          var d=DATA[state.lane];
          if(!d||(d.source!=="musixmatch"&&d.source!=="upload")) return; /* live/upload only */
          var src=_liveLines||flatLines().map(function(ln){return {id:ln.id,text:ln.text};});
          var texts=src.map(function(l){return l.text;});
          if(!texts.length) return;
          d.depthPending=true;
          renderHead(); renderOverview();
          fetch("/api/depth",{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({trackId:(d.id||trackId||uploadId),lines:texts,track:{title:d.title,artist:d.artist}})
          })
          .then(function(r){ return r.ok?r.json():Promise.reject(); })
          .then(function(res){
            d.depthPending=false;
            d.depthScore=res.depth;
            d.depthSub=res.sub||[];
            d.depthRationale=res.rationale||"";
            renderHead(); renderOverview();
          })
          .catch(function(){ d.depthPending=false; renderHead(); renderOverview(); });
        }

        /* ── Rhymes toggle ───────────────────────────────────────── */
        rhymesToggle.addEventListener("click",function(){
          _rhymesOn=!_rhymesOn;
          rhymesToggle.classList.toggle("is-on",_rhymesOn);
          transcriptPane.classList.toggle("rhymes-off",!_rhymesOn);
          rhLegend.hidden=!_rhymesOn;
        });

        /* ── Show lane switch only with no catalog track and no upload ── */
        if(!trackId&&!uploadId) laneSwitch.hidden=false;

        /* ── Init ────────────────────────────────────────────────── */
        if(uploadId) loadUploadTrack(uploadId);
        else setLane("starlight");
      })();
    </script>
  </body>
</html>
